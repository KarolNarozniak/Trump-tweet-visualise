[build]
input_csv = "tweets_01-08-2021.csv"
output_dir = "data/processed"
min_mention_count = 1
global_min_mentions = 8
include_retweets = true
heat_decay = 0.85
layout_seed = 42

[app]
processed_dir = "data/processed"
include_hub = true
always_label_top_nodes = false
playback_speed = 8.0
node_size_multiplier = 2.0
layout_spread = 1.0
initial_zoom_boost = 0.8
graph_height_px = 1000

[runtime]
streamlit_host = "0.0.0.0"
streamlit_port = 3001
docs_host = "0.0.0.0"
docs_port = 3002
docs_url = "http://localhost:3002"
docs_site_dir = "docs-site"

[meta]
app_name = "Trump Graph"
logo_path = "logo.png"
data_source_url = "https://www.thetrumparchive.com/"
repository_url = "https://github.com/KarolNarozniak/Trump-tweet-visualise"
disclaimer_text = "Disclaimer: This visualization is a student educational project for studying time-dependent graph behavior. It is not intended as political endorsement, defamation, or factual/legal judgment about any person."
about_text = "Trump Graph is a student project focused on temporal network analysis. Its purpose is to explore how mentions and co-mentions evolve over time in archived tweet data. The project is purely educational."
